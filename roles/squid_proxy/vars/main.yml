---
# ─── New Relic Allowed Domains ─────────────────
# NOTE: Squid 6.x is strict about subdomain overlaps.
#       If ".newrelic.com" is listed, do NOT also list "api.newrelic.com"
#       (it's already covered by the wildcard). Same for other wildcards.
newrelic_domains:
  - ".newrelic.com"
  - ".nr-data.net"
  - ".js-agent.newrelic.com"
  - ".synthetics-horde.nr-data.net"
  - ".synthetics-horde.eu01.nr-data.net"

# ─── OS Repo Domains (agar installer NR bisa pull packages) ──
os_repo_domains:
  - ".ubuntu.com"
  - ".debian.org"
  - ".rockylinux.org"
  - ".almalinux.org"
  - ".centos.org"
  - ".fedoraproject.org"
  - ".rpmfusion.org"
  - ".amazonaws.com"
  - ".cloudfront.net"
  - ".opensuse.org"
  - ".suse.com"

# Merged list untuk template
allowed_domains: "{{ newrelic_domains + os_repo_domains }}"

# ─── New Relic Endpoints (untuk verification) ──
# Di-ping via verify.yml untuk memastikan routing sukses
newrelic_endpoints:
