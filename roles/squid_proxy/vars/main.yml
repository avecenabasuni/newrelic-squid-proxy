  - "nr-downloads-main.s3.us-east-1.amazonaws.com"

# ─── OS Repo Domains (agar installer NR bisa pull packages) ──
os_repo_domains:
  - ".ubuntu.com"
  - ".debian.org"
  - ".security.debian.org"
  - ".rockylinux.org"
  - ".almalinux.org"
  - ".centos.org"
