---
# Task router — includes OS-specific vars and all task files

- name: Cek OS dan import variabel spesifik
  ansible.builtin.include_vars: "{{ ansible_os_family }}.yml"

- name: Setup SELinux contexts (RHEL/CentOS)
  ansible.builtin.import_tasks: selinux.yml
  when: squid_selinux_enabled | d(false) | bool

- name: Install Squid Packages
  ansible.builtin.import_tasks: install.yml

- name: Configure Squid
  ansible.builtin.import_tasks: configure.yml

- name: Deploy Dynamic ACL domain list
  ansible.builtin.import_tasks: dynamic_acl.yml

- name: Setup SSL Bump
  ansible.builtin.import_tasks: ssl_bump.yml
  when: ssl_bump_enabled | bool

- name: Setup Basic Auth
  ansible.builtin.import_tasks: auth.yml
  when: basic_auth_enabled | bool

- name: Setup New Relic Integration (Logs & Metrics)
  ansible.builtin.import_tasks: monitoring.yml
  when: nr_integration_enabled | d(false) | bool

- name: Manage Squid service
  ansible.builtin.import_tasks: service.yml
