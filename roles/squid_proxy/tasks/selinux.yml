---
# tasks/selinux.yml
# Called exclusively for RedHat-family (RHEL, CentOS, Rocky, Alma, Fedora)
# ensures port binding and directory access succeed when SELinux is Enforcing.

- name: Set SELinux boolean 'squid_connect_any' to allow outbound connections
  ansible.posix.seboolean:
    name: squid_connect_any
    state: true
    persistent: true
  failed_when: false # Ignore if seboolean package is not perfectly installed, though it's recommended
  tags: ['selinux']

- name: Allow Squid to bind to specific proxy port {{ squid_port }}
  community.general.seport:
    ports: "{{ squid_port }}"
    proto: tcp
    setype: squid_port_t
    state: present
  failed_when: false
  tags: ['selinux']

- name: "Allow Squid to bind to SSL Bump port if enabled: {{ ssl_bump_port }}"
  community.general.seport:
    ports: "{{ ssl_bump_port }}"
    proto: tcp
    setype: squid_port_t
    state: present
  when: ssl_bump_enabled | bool
  failed_when: false
  tags: ['selinux']

- name: Ensure SELinux context for Squid cache directory is correct
  community.general.sefcontext:
    target: '/var/spool/squid(/.*)?'
    setype: squid_cache_t
    state: present
  failed_when: false
  tags: ['selinux']

- name: Apply new SELinux file context to cache directory
  ansible.builtin.command: restorecon -Rv /var/spool/squid
  changed_when: false
  failed_when: false
  tags: ['selinux']
