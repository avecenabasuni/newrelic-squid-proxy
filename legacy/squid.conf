###############################################################################
# Squid Proxy for New Relic (Allow-list only)
# Author : Avecena Basuni
# Updated: 2025-10-03
#
# Tujuan:
# - HANYA mengizinkan klien dari localnet mengakses endpoint New Relic
# - Aman untuk guided install (CLI + agent), tanpa ssl_bump
# - Menyediakan blok OPSIONAL (repo OS, auth, DNS) yang bisa diaktifkan bila perlu
###############################################################################

##############################
# [1] DEFINISI JARINGAN/PORT #
##############################

# -- Jaringan internal (RFC1918) yang boleh memakai proxy
acl localnet src 10.0.0.0/8
# acl localnet src <YOUR_IP>/32          # Tambahkan IP spesifik jika perlu
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16

# -- Localhost (server proxy itu sendiri) → penting biar curl dari host ini ke proxy nggak ke-403
acl localhost src 127.0.0.1/32 ::1

# -- Port aman
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl Safe_ports port 1025-65535

#####################################
# [2] DAFTAR DOMAIN YANG DIIZINKAN  #
#####################################

# -- New Relic dan CDN/artefak yang umum dipakai installer/agent
#    Catatan:
#    - *.newrelic.com mencakup banyak endpoint API/ingest.
#    - nr-downloads-main.s3... diperlukan untuk beberapa artefak/file publik.
acl allowed_domains dstdomain \
    .newrelic.com \
    .eu.newrelic.com \
    .nr-data.net \
    download.newrelic.com \
    api.newrelic.com \
    infra-api.newrelic.com \
    identity-api.newrelic.com \
    infrastructure-command-api.newrelic.com \
    nr-downloads-main.s3.us-east-1.amazonaws.com

#########################################
# [3] FILTER SAFETY & BASIC PROTECTION  #
#########################################

# Tolak request ke port yg tidak aman + CONNECT selain 443
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Proteksi service lokal & link-local pada host proxy
http_access deny to_localhost
http_access deny to_linklocal

##############################################
# [4] KEBIJAKAN AKSES (URUTAN PENTING / FINAL)
##############################################

# IZINKAN: localhost (server proxy) ke domain yang diizinkan
http_access allow localhost allowed_domains

# IZINKAN: hanya klien dari localnet menuju domain yg diizinkan
http_access allow localnet allowed_domains

# TOLAK: semua selain di atas
http_access deny all

#####################
# [5] LISTENING PORT
#####################

http_port 3128

########################
# [6] LOGGING & ROTATION
########################

access_log /var/log/squid/access.log squid
cache_log  /var/log/squid/cache.log
logfile_rotate 10

#########################
# [7] CACHING & TUNING  #
#########################

# Kebijakan refresh konservatif (boleh disesuaikan)
refresh_pattern -i \.(jpg|jpeg|png|gif|ico|svg)$ 10080 90% 43200
refresh_pattern -i \.(js|css|html|htm)$          1440  90% 40320
refresh_pattern -i \.(zip|tar|gz|bz2|7z)$        10080  90% 43200
refresh_pattern . 0 20% 4320

cache_mem 256 MB
maximum_object_size_in_memory 512 KB

# Jangan cache konten dinamis
acl QUERY urlpath_regex cgi-bin \?
cache deny QUERY

######################
# [8] PRIVACY SETTINGS
######################

forwarded_for off
request_header_access X-Forwarded-For deny all

######################
# [9] CORE DUMP & PATH
######################

coredump_dir /var/spool/squid

################################################################################
# [A] OPSIONAL: REPO OS SAAT INSTALASI (UNCOMMENT JIKA BUTUH)
# Penjelasan:
# - Guided install kadang menarik paket OS (ca-certificates, gnupg, dst).
# - Jika host tidak punya mirror lokal, aktifkan sementara daftar repo berikut.
# - Setelah instalasi sukses, disarankan dikembalikan ke mode ketat (comment lagi).
################################################################################
#
# acl os_repos dstdomain \
#     .ubuntu.com .security.ubuntu.com .archive.ubuntu.com \
#     .debian.org .security.debian.org .deb.debian.org \
#     .rockylinux.org .almalinux.org .centos.org \
#     .fedoraproject.org .rpmfusion.org \
#     .epel.mirror .dl.fedoraproject.org \
#     .amazonaws.com .cloudfront.net
#
# # LETAKKAN baris allow di bawah ini TEPAT DI ATAS "http_access deny all" pada bagian [4].
# # Jika struktur file ini tidak diubah, cukup UNCOMMENT kedua blok "acl os_repos" di atas
# # dan baris allow berikut, lalu reload Squid.
# #
# # http_access allow localhost os_repos
# # http_access allow localnet os_repos

################################################################################
# [B] OPSIONAL: BASIC AUTH UNTUK AKSES PROXY (UNCOMMENT JIKA BUTUH)
# - Buat file password: sudo htpasswd -c /etc/squid/passwords <username>
# - Pastikan path helper sesuai distro (cek `dpkg -L squid` / `rpm -ql squid`)
################################################################################
#
# auth_param basic program /usr/lib/squid/basic_ncsa_auth /etc/squid/passwords
# auth_param basic children 5
# auth_param basic realm Squid Proxy Authentication
# auth_param basic credentialsttl 2 hours
# acl authenticated_users proxy_auth REQUIRED
#
# # Contoh kebijakan akses bila pakai auth:
# # http_access allow authenticated_users localnet allowed_domains
# # http_access allow authenticated_users localnet os_repos   # (jika blok repo diaktifkan sementara)
# # http_access deny all

################################################################################
# [C] OPSIONAL: DNS KHUSUS (UNCOMMENT JIKA BUTUH)
# - Aktifkan bila server perlu resolver spesifik (mis. Cloudflare/Google).
################################################################################
#
# dns_nameservers 1.1.1.1 1.0.0.1
# dns_nameservers 8.8.8.8 8.8.4.4
# dns_retransmit_interval 5 seconds
# dns_timeout 30 seconds
