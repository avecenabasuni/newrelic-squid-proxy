###############################################################################
# Squid Proxy for New Relic (Allow-list only)
# Author : Avecena Basuni
# Updated: 2025-10-03
#
# Goal:
# - ONLY allow localnet clients to access New Relic endpoints
# - Safe for guided install (CLI + agent), without ssl_bump
# - Provides OPTIONAL blocks (OS repo, auth, DNS) that can be enabled if needed
###############################################################################

##############################
# [1] NETWORK/PORT DEFINITION #
##############################

# -- Internal network (RFC1918) allowed to use the proxy
acl localnet src 10.0.0.0/8
# acl localnet src <YOUR_IP>/32          # Add specific IP if needed
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16

# -- Localhost (the proxy server itself) → important so curl from this host to the proxy doesn't get 403
acl localhost src 127.0.0.1/32 ::1

# -- Safe ports
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl Safe_ports port 1025-65535

#####################################
# [2] ALLOWED DOMAIN LIST           #
#####################################

# -- New Relic and common CDN/artifacts used by installer/agent
#    Note:
#    - *.newrelic.com covers many API/ingest endpoints.
#    - nr-downloads-main.s3... required for some artifacts/public files.
acl allowed_domains dstdomain \
    .newrelic.com \
    .eu.newrelic.com \
    .nr-data.net \
    download.newrelic.com \
    api.newrelic.com \
    infra-api.newrelic.com \
    identity-api.newrelic.com \
    infrastructure-command-api.newrelic.com \
    nr-downloads-main.s3.us-east-1.amazonaws.com

#########################################
# [3] SAFETY FILTER & BASIC PROTECTION #
#########################################

# Deny requests to unsafe ports + CONNECT other than 443
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Protect local & link-local services on the proxy host
http_access deny to_localhost
http_access deny to_linklocal

##############################################
# [4] ACCESS POLICY (IMPORTANT ORDER / FINAL)
##############################################

# ALLOW: localhost (proxy server) to allowed domains
http_access allow localhost allowed_domains

# ALLOW: only localnet clients to allowed domains
http_access allow localnet allowed_domains

# DENY: everything else
http_access deny all

#####################
# [5] LISTENING PORT
#####################

http_port 3128

########################
# [6] LOGGING & ROTATION
########################

access_log /var/log/squid/access.log squid
cache_log  /var/log/squid/cache.log
logfile_rotate 10

#########################
# [7] CACHING & TUNING  #
#########################

# Conservative refresh policy (adjustable)
refresh_pattern -i \.(jpg|jpeg|png|gif|ico|svg)$ 10080 90% 43200
refresh_pattern -i \.(js|css|html|htm)$          1440  90% 40320
refresh_pattern -i \.(zip|tar|gz|bz2|7z)$        10080  90% 43200
refresh_pattern . 0 20% 4320

cache_mem 256 MB
maximum_object_size_in_memory 512 KB

# Do not cache dynamic content
acl QUERY urlpath_regex cgi-bin \?
cache deny QUERY

######################
# [8] PRIVACY SETTINGS
######################

forwarded_for off
request_header_access X-Forwarded-For deny all

######################
# [9] CORE DUMP & PATH
######################

coredump_dir /var/spool/squid

################################################################################
# [A] OPTIONAL: OS REPO DURING INSTALLATION (UNCOMMENT IF NEEDED)
# Explanation:
# - Guided install sometimes pulls OS packages (ca-certificates, gnupg, etc).
# - If the host doesn't have a local mirror, temporarily enable the following repo list.
# - After successful installation, it is recommended to return to strict mode (comment out again).
################################################################################
#
# acl os_repos dstdomain \
#     .ubuntu.com .security.ubuntu.com .archive.ubuntu.com \
#     .debian.org .security.debian.org .deb.debian.org \
#     .rockylinux.org .almalinux.org .centos.org \
#     .fedoraproject.org .rpmfusion.org \
#     .epel.mirror .dl.fedoraproject.org \
#     .amazonaws.com .cloudfront.net
#
# # PLACE the allow line below EXACTLY ABOVE "http_access deny all" in section [4].
# # If this file structure is unchanged, just UNCOMMENT both "acl os_repos" blocks above
# # and the following allow line, then reload Squid.
# #
# # http_access allow localhost os_repos
# # http_access allow localnet os_repos

################################################################################
# [B] OPTIONAL: BASIC AUTH FOR PROXY ACCESS (UNCOMMENT IF NEEDED)
# - Create password file: sudo htpasswd -c /etc/squid/passwords <username>
# - Ensure helper path matches distro (check `dpkg -L squid` / `rpm -ql squid`)
################################################################################
#
# auth_param basic program /usr/lib/squid/basic_ncsa_auth /etc/squid/passwords
# auth_param basic children 5
# auth_param basic realm Squid Proxy Authentication
# auth_param basic credentialsttl 2 hours
# acl authenticated_users proxy_auth REQUIRED
#
# # Example access policy when using auth:
# # http_access allow authenticated_users localnet allowed_domains
# # http_access allow authenticated_users localnet os_repos   # (if repo block is temporarily enabled)
# # http_access deny all

################################################################################
# [C] OPTIONAL: SPECIFIC DNS (UNCOMMENT IF NEEDED)
# - Enable if the server needs a specific resolver (e.g. Cloudflare/Google).
################################################################################
#
# dns_nameservers 1.1.1.1 1.0.0.1
# dns_nameservers 8.8.8.8 8.8.4.4
# dns_retransmit_interval 5 seconds
# dns_timeout 30 seconds
